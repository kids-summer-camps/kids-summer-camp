    <!-- Rocket Window -->
    <circle cx="150" cy="180" r="25" fill="#60A5FA" stroke="#1E40AF" stroke-width="3"/>
    
    <!-- Rocket Nose -->
    <path d="M100 100L150 40L200 100" fill="#F97316" stroke="#EA580C" stroke-width="4"/>
    
    <!-- Left Fin -->
